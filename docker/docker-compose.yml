services:

  backend:
    build: ./backend
    container_name: backend
    depends_on:
      - mysql
      - redis
    networks:
      - app-network

  nginx:
    image: nginx
    container_name: reverse-proxy
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network

  mysql:
    image: mysql:5.7
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users
    ports:
      - "3306:3306"
    networks:
      - app-network

  redis:
    image: redis
    container_name: redis
    networks:
      - app-network

networks:
  app-network: